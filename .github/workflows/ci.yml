name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      # Default features only: `--all-features` currently breaks
      # himadri-observability due to an opentelemetry version mismatch
      # unrelated to this change; the production binary never builds with
      # --all-features, so gate on what actually ships.
      - name: Clippy (default features, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (default features)
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p himadri

  web:
    name: Web (typecheck, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
